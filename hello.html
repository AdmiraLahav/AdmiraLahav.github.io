<!DOCTYPE html>
<html>
<head>
    <title>Console Demo</title>
</head>
<body>

<h3>Nothing to see here.</h3>
<p>Open the console.</p>

<script>
// === BASIC CONSOLE PLAYGROUND ===

// Step 1: simple output
console.log("Page loaded.");

// Step 2: hidden function
function test() {
    console.log("You ran the test function.");
}

// Step 3: global function (accessible from console)
window.unlock = function() {
    document.body.innerHTML = "<h1>Unlocked</h1>";
};

// Step 4: function with parameter
window.say = function(msg) {
    console.log("You said:", msg);
};

// Step 5: simple password check
const secret = "1234";

window.login = function(input) {
    if (input === secret) {
        console.log("Access granted");
    } else {
        console.log("Access denied");
    }
};

// Step 6: object interaction
window.system = {
    status: "locked",
    open: function() {
        this.status = "open";
        console.log("System opened");
    }
};

</script>

</body>
</html>
