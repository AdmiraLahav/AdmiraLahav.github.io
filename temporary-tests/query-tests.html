<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>User Panel</title>
  <style>
    :root {
      --bg: #000001;
      --panel: #111111;
      --text: #cfe8ff;
      --muted: #88a0b3;
      --green: #27ff27;
      --blue: #3ea6ff;
      --red: #ff4c4c;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .panel {
      background: var(--panel);
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
      width: 300px;
    }

    .title {
      color: var(--blue);
      margin-bottom: 15px;
    }

    .field {
      margin: 10px 0;
    }

    .value {
      font-weight: bold;
    }

    .true {
      color: var(--green);
    }

    .false {
      color: var(--red);
    }
  </style>
</head>
<body>

  <div class="panel">
    <div class="title">[ USER PANEL ]</div>

    <div class="field">
      Dark mode status: <span id="input" class="value">Loading...</span>
    </div>
  </div>
</body>
<script>
    const url_paramaters = new URLSearchParams(window.location.search);

    const dark_mode_status = url_paramaters.get("dark_mode") || "Unknown";

    const display_status = document.getElementById("input");

    display_status.textContent = dark_mode_status;
  </script>
</html>
