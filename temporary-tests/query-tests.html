<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>User Panel</title>
  <style>
    :root {
      --bg: #0b0f12;
      --panel: #0b1721;
      --text: #cfe8ff;
      --muted: #88a0b3;
      --accent: #66d9ef;
      --green: #27ff27;
      --blue: #3ea6ff;
      --red: #ff4c4c;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .panel {
      background: var(--panel);
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
      width: 300px;
    }

    .title {
      color: var(--accent);
      margin-bottom: 15px;
    }

    .field {
      margin: 10px 0;
    }

    .value {
      font-weight: bold;
    }

    .true {
      color: var(--green);
    }

    .false {
      color: var(--red);
    }
  </style>
</head>
<body>

  <div class="panel">
    <div class="title">[ USER PANEL ]</div>

    <div class="field">
      Username: <span id="username" class="value">Loading...</span>
    </div>

    <div class="field">
      Admin: <span id="admin" class="value">Loading...</span>
    </div>
  </div>

  <script>
    // Parse URL parameters
    const params = new URLSearchParams(window.location.search);

    // Get values
    const username = params.get("user") || "Guest";
    const admin = params.get("admin") === "true";

    // Display values
    const usernameEl = document.getElementById("username");
    const adminEl = document.getElementById("admin");

    usernameEl.textContent = username;

    adminEl.textContent = admin ? "TRUE" : "FALSE";
    adminEl.classList.add(admin ? "true" : "false");

    // Debug logging
    console.log("Parsed user:", username);
    console.log("Parsed admin:", admin);
  </script>

</body>
</html>
