<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>404</title>

  <style>
    
    :root {
      --black: #0A0A0A;
      --test:#ff00003b;
      --opacity:01;
      --zero-width:230px;
      --zero-hight:290px;
      --border:50px;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: white;
      color: aliceblue;
      font-family: Arial, sans-serif;
    }

    .container {
      position: relative;
      width: 600px;
      height: 400px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .bg-404 {
      position: relative;
      z-index: 1;
      user-select: none;
      pointer-events: none;
    }

    .bg-404 p {
        color: red;
      font-size: 400px;
      font-weight: 900;
      margin: 0;
    }

    .show{
        background-color: #2f00ff;
    }
    .hide{
        background-color: var(--black);
    }
    .top-left-4 {
      position: absolute;
      width: 400px;
      height: 55px;
      transform: rotate(-50deg);
      top: 45.6%;
      left: -15.7%;
      z-index: 2;
      opacity: var(--opacity);
    }

    .center-pillar-4 {
      position: absolute;
      width: 290px;
      height: 70px;
      transform: rotate(90deg);
      top: 46%;
      left: 5.4%;
      z-index: 2;
      opacity: var(--opacity);
    }

    .bottom-line-4 {
      position: absolute;
      width: 250px;
      height: 62px;
      transform: rotate(0deg);
      top: 57.5%;
      left: 1%;
      z-index: 2;
      opacity: var(--opacity);
    }
  
    .zero {
      position: absolute;
      width: var(--zero-width);
      height: var(--zero-hight);
      top: 52.4%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 2;
      border-radius: var(--border);
      opacity: var(--opacity);
    }
    .zero-hole {
      position: absolute;
      width: calc(var(--zero-width)/2);
      height: calc(var(--zero-hight)/1.5);
      top: 52.4%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 2;
      border-radius: calc(var(--border)/2);
      opacity: var(--opacity);
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="bg-404">
        <p>404</p>
      <div class="show top-left-4"></div>
      <div class="show center-pillar-4"></div>
      <div class="show bottom-line-4"></div>
      <div class="show zero"></div>
    <div class="hide zero-hole"></div>
    </div>
  </div>
</body>
</html>
